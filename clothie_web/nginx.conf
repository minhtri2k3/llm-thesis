server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for Flutter assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Flutter SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────
    # API reverse proxy → fashion-api container (internal DNS)
    # ^~ prefix gives this location priority over regex rules,
    # so /api/images/*.jpg is proxied and NOT served as static.
    # ──────────────────────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass http://fashion-api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── SSE-critical: disable all buffering ──────────────
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;
        proxy_send_timeout       3600s;
        proxy_connect_timeout    10s;

        # Keep connection alive for streaming
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Static Flutter assets — long cache (only non-/api/ paths)
    location ~* \.(js|wasm|css|png|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
